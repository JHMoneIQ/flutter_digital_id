name: flutter_digital_id_platform_interface
description: Platform interface and shared data models for flutter_digital_id. Defines DigitalIdCredential (structured claims + raw cryptographic proof), DigitalIdRequestOptions (selective disclosure), ClaimPath, and hand-coded serialization for Dart/.NET backend parity.
version: 0.1.0
homepage: https://github.com/jameshancock/flutter_digital_id
repository: https://github.com/jameshancock/flutter_digital_id
issue_tracker: https://github.com/jameshancock/flutter_digital_id/issues
license: MIT

resolution: workspace

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.38.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
