name: flutter_digital_id_darwin
description: iOS (and macOS) implementation of flutter_digital_id using PassKit Verify with Wallet (PKIdentity* APIs). Returns apple-encrypted blobs for server-side decryption and verification. Requires Apple entitlement for full functionality.
version: 0.1.0
homepage: https://github.com/jameshancock/flutter_digital_id
repository: https://github.com/jameshancock/flutter_digital_id
issue_tracker: https://github.com/jameshancock/flutter_digital_id/issues
license: MIT

resolution: workspace

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.38.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_digital_id_platform_interface: ^0.1.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: FlutterDigitalIdPlugin
        dartPluginClass: FlutterDigitalIdDarwin
        sharedDarwinSource: true
      macos:
        pluginClass: FlutterDigitalIdPlugin
        dartPluginClass: FlutterDigitalIdDarwin
        sharedDarwinSource: true
