name: flutter_digital_id_darwin
description: iOS and macOS implementation of flutter_digital_id (unified darwin package).
version: 0.1.0
homepage: https://github.com/jameshancock/flutter_digital_id

resolution: workspace

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.38.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_digital_id_platform_interface: ^0.1.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: FlutterDigitalIdPlugin
        dartPluginClass: FlutterDigitalIdDarwin
        sharedDarwinSource: true
      macos:
        pluginClass: FlutterDigitalIdPlugin
        dartPluginClass: FlutterDigitalIdDarwin
        sharedDarwinSource: true
