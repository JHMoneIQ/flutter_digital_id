name: flutter_digital_id_web
description: Web implementation of flutter_digital_id targeting the W3C Digital Credentials API (navigator.credentials.get with digital requests). Builds OpenID4VP/DCQL requests and extracts raw responses using hardened heuristics. Interoperability depends on browser + wallet support for the emerging standard.
version: 0.1.0
homepage: https://github.com/jameshancock/flutter_digital_id
repository: https://github.com/jameshancock/flutter_digital_id
issue_tracker: https://github.com/jameshancock/flutter_digital_id/issues
license: MIT

resolution: workspace

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.38.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  flutter_digital_id_platform_interface: ^0.1.0
  web: ^1.1.0   # Preferred for JS interop (as per project guidelines)

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      web:
        pluginClass: FlutterDigitalIdWeb
        fileName: flutter_digital_id_web.dart
