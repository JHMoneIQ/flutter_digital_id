name: flutter_digital_id
description: Flutter plugin for requesting digital identity documents (passport, EU Digital ID / PID, driver's license / mDL) from native wallets. Returns rich structured fields for UI pre-fill plus the raw cryptographic proof (encrypted blob or mdoc/vp_token) that your backend must verify before trusting any identity data.
version: 0.1.0
homepage: https://github.com/jameshancock/flutter_digital_id
repository: https://github.com/jameshancock/flutter_digital_id
issue_tracker: https://github.com/jameshancock/flutter_digital_id/issues
license: MIT

resolution: workspace

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.38.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_digital_id_platform_interface: ^0.1.0
  flutter_digital_id_android: ^0.1.0
  flutter_digital_id_darwin: ^0.1.0
  flutter_digital_id_web: ^0.1.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        default_package: flutter_digital_id_android
      ios:
        default_package: flutter_digital_id_darwin
      macos:
        default_package: flutter_digital_id_darwin
      web:
        default_package: flutter_digital_id_web
